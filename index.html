<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bloomgram — send a digital bouquet</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf6f0;
      --blush: #f0d9cc;
      --rose: #c97a6f;
      --deep: #2c1f1a;
      --sage: #8a9e84;
      --mist: #e8e0d8;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Floating petals */
    .petals-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Main layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Logo / brand */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.3s;
    }

    .hero-flower {
      font-size: clamp(5rem, 15vw, 9rem);
      line-height: 1;
      margin-bottom: 1.5rem;
      display: block;
      opacity: 0;
      animation: bloom 1.2s cubic-bezier(.22,1,.36,1) forwards 0.5s;
      filter: drop-shadow(0 8px 24px rgba(201,122,111,0.18));
    }
    @keyframes bloom {
      0% { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--deep);
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.7s;
    }
    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--sage);
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.9s;
    }

    @keyframes rise {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Buttons */
    .btns {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      align-items: center;
      opacity: 0;
      animation: rise 1s ease forwards 1.1s;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 100px;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--deep);
      color: var(--cream);
      border: 1.5px solid var(--deep);
    }
    .btn-primary:hover {
      background: var(--rose);
      border-color: var(--rose);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,122,111,0.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--deep);
      border: 1.5px solid var(--deep);
    }
    .btn-ghost:hover {
      background: var(--blush);
      transform: translateY(-2px);
    }

    /* Decorative divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--mist);
      margin: 3rem auto;
      opacity: 0;
      animation: rise 1s ease forwards 1.3s;
    }

    /* Flower row preview */
    .flower-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      font-size: 1.8rem;
      opacity: 0;
      animation: rise 1s ease forwards 1.5s;
    }
    .flower-row span {
      display: inline-block;
      animation: sway 3s ease-in-out infinite;
    }
    .flower-row span:nth-child(2) { animation-delay: 0.3s; }
    .flower-row span:nth-child(3) { animation-delay: 0.6s; }
    .flower-row span:nth-child(4) { animation-delay: 0.9s; }
    .flower-row span:nth-child(5) { animation-delay: 1.2s; }
    .flower-row span:nth-child(6) { animation-delay: 1.5s; }
    .flower-row span:nth-child(7) { animation-delay: 1.8s; }
    @keyframes sway {
      0%, 100% { transform: rotate(-5deg) translateY(0); }
      50% { transform: rotate(5deg) translateY(-5px); }
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--sage);
      z-index: 2;
      opacity: 0;
      animation: rise 1s ease forwards 1.8s;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: var(--rose); }
  </style>
</head>
<body>

  <!-- Floating petals background -->
  <div class="petals-bg" id="petals"></div>

  <main class="page">
    <span class="brand">bloomgram</span>
    <span class="hero-flower">🌸</span>
    <h1>beautiful flowers,<br/><em>delivered digitally</em></h1>
    <p class="subtitle">craft a bouquet · share with someone you love</p>

    <div class="btns">
      <a href="bouquet.html" class="btn btn-primary">✦ Build a Bouquet</a>
      <a href="gallery.html" class="btn btn-ghost">View the Garden</a>
    </div>

    <div class="divider"></div>

    <div class="flower-row">
      <span>🌹</span>
      <span>🌷</span>
      <span>🌸</span>
      <span>🌻</span>
      <span>🌺</span>
      <span>🪷</span>
      <span>🌼</span>
    </div>
  </main>

  <footer>
    made with 💛 &nbsp;·&nbsp; <a href="https://vercel.com">powered by ▲ vercel</a>
  </footer>

  <script>
    // Generate floating petals
    const petalEmoji = ['🌸','🌺','🌼','🍃','🌿','✿'];
    const container = document.getElementById('petals');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = petalEmoji[Math.floor(Math.random() * petalEmoji.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
      p.style.animationDuration = (Math.random() * 10 + 12) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.opacity = '0';
      container.appendChild(p);
    }
  </script>
</body>
</html>
