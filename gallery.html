<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>the garden — bloomgram</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf6f0;
      --blush: #f0d9cc;
      --rose: #c97a6f;
      --deep: #2c1f1a;
      --sage: #8a9e84;
      --mist: #e8e0d8;
    }
    html, body {
      min-height: 100%;
      background: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }
    nav {
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--mist);
      background: rgba(250,246,240,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 99;
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 300;
      letter-spacing: 0.15em; text-decoration: none; color: var(--deep);
    }
    .nav-brand:hover { color: var(--rose); }
    .nav-link {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--sage); text-decoration: none;
    }
    .nav-link:hover { color: var(--rose); }

    .hero {
      text-align: center; padding: 4rem 2rem 2rem;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 4rem); font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .hero h1 em { font-style: italic; color: var(--rose); }
    .hero p { font-size: 0.85rem; color: var(--sage); letter-spacing: 0.08em; margin-bottom: 2rem; }

    .garden-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .garden-card {
      background: white;
      border: 1.5px solid var(--mist);
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .garden-card:hover {
      border-color: var(--rose);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(201,122,111,0.12);
    }
    .card-flowers { font-size: 1.8rem; margin-bottom: 0.8rem; line-height: 1.3; }
    .card-to { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--rose); margin-bottom: 0.4rem; }
    .card-msg { font-size: 0.8rem; color: var(--sage); line-height: 1.5; }
    .card-count { font-size: 0.65rem; color: var(--mist); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.8rem; }

    .cta-wrap {
      text-align: center; padding: 3rem;
    }
    .btn {
      display: inline-block; padding: 0.9rem 2.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.75rem;
      font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase;
      text-decoration: none; border-radius: 100px;
      background: var(--deep); color: var(--cream); border: 1.5px solid var(--deep);
      transition: all 0.25s;
    }
    .btn:hover { background: var(--rose); border-color: var(--rose); transform: translateY(-2px); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="index.html">🌸 bloomgram</a>
    <a class="nav-link" href="bouquet.html">Build a bouquet →</a>
  </nav>

  <div class="hero">
    <h1>the <em>garden</em></h1>
    <p>bouquets sent with love from around the world</p>
  </div>

  <div class="garden-grid" id="gardenGrid"></div>

  <div class="cta-wrap">
    <a href="bouquet.html" class="btn">✦ Send your own bouquet</a>
  </div>

  <script>
    // Showcase bouquets — in a real app these would come from a DB
    const examples = [
      { flowers: '🌹🌷🌸🌸🌼', to: 'Mum', msg: 'Happy birthday! Wishing you all the joy in the world.', count: 5 },
      { flowers: '🌻🌻🌸🍃🌿', to: 'Sarah', msg: 'Just thinking of you — sending sunshine your way.', count: 5 },
      { flowers: '🌺🪷🌺🌺🌸🌸', to: 'My love', msg: 'Every day with you is a gift.', count: 6 },
      { flowers: '🌹🌹🌹🌹🌹', to: 'Valentina', msg: '', count: 5 },
      { flowers: '🌸🌷🌼🌻💐🍀', to: 'Grandma Rose', msg: 'Missing you. These flowers are for you.', count: 6 },
      { flowers: '🌵🪸🌾🍁🌿', to: 'Theo', msg: 'You\'re one of a kind — just like this bouquet.', count: 5 },
      { flowers: '🌸🌸🌸🌸🌸🌸🌸🌸', to: 'My best friend', msg: 'Congratulations on everything!!', count: 8 },
      { flowers: '🌹🌷🌼🌸🌺', to: 'Nana', msg: 'Get well soon. We love you so much.', count: 5 },
    ];

    const grid = document.getElementById('gardenGrid');
    examples.forEach(b => {
      const params = new URLSearchParams({
        flowers: b.flowers.split('').filter(c => c.trim()).join(','),
        to: b.to,
        msg: b.msg
      });
      const card = document.createElement('a');
      card.className = 'garden-card';
      card.href = `view.html?${params.toString()}`;
      card.innerHTML = `
        <div class="card-flowers">${b.flowers}</div>
        <div class="card-to">for ${b.to}</div>
        ${b.msg ? `<div class="card-msg">"${b.msg}"</div>` : ''}
        <div class="card-count">${b.count} flowers</div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
