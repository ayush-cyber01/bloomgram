<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>build your bouquet — bloomgram</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf6f0;
      --blush: #f0d9cc;
      --rose: #c97a6f;
      --deep: #2c1f1a;
      --sage: #8a9e84;
      --mist: #e8e0d8;
    }
    html, body {
      min-height: 100%;
      background: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 99;
      background: rgba(250,246,240,0.9);
      backdrop-filter: blur(12px);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--mist);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 300;
      letter-spacing: 0.15em; text-decoration: none;
      color: var(--deep);
    }
    .nav-brand:hover { color: var(--rose); }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      min-height: calc(100vh - 61px);
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* LEFT PANEL — picker */
    .picker-panel {
      padding: 2.5rem 2.5rem 2.5rem 2.5rem;
      border-right: 1px solid var(--mist);
      overflow-y: auto;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300;
      margin-bottom: 0.3rem;
    }
    .panel-sub {
      font-size: 0.75rem; letter-spacing: 0.12em;
      color: var(--sage); margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .flower-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 0.8rem;
    }
    .flower-card {
      background: white;
      border: 1.5px solid var(--mist);
      border-radius: 16px;
      padding: 1rem 0.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .flower-card:hover {
      border-color: var(--rose);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(201,122,111,0.15);
    }
    .flower-card.selected {
      border-color: var(--rose);
      background: #fff5f3;
    }
    .flower-card .emoji { font-size: 2rem; display: block; margin-bottom: 0.4rem; }
    .flower-card .name {
      font-size: 0.65rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--sage);
    }
    .flower-card .count-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--rose); color: white;
      font-size: 0.65rem; font-weight: 400;
      width: 20px; height: 20px;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .flower-card.selected .count-badge { opacity: 1; }

    /* SECTION HEADING */
    .section-label {
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--rose); margin: 2rem 0 0.8rem;
      font-weight: 400;
    }

    /* RIGHT PANEL — bouquet preview + message */
    .preview-panel {
      background: white;
      padding: 2.5rem 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
      position: sticky; top: 61px;
      height: calc(100vh - 61px);
      overflow-y: auto;
    }
    .preview-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 300;
    }

    /* Bouquet canvas */
    .bouquet-canvas {
      background: var(--cream);
      border-radius: 20px;
      min-height: 200px;
      padding: 1.5rem;
      display: flex; flex-wrap: wrap;
      gap: 0.4rem; align-content: flex-start;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: all 0.3s ease;
    }
    .bouquet-canvas.empty::after {
      content: 'tap flowers to add them';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--mist);
    }
    .bouquet-flower {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      display: inline-block;
      animation: popIn 0.3s cubic-bezier(.22,1,.36,1);
      cursor: pointer;
      transition: transform 0.15s;
      line-height: 1;
    }
    .bouquet-flower:hover { transform: scale(1.3) rotate(10deg); }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bouquet-count {
      font-size: 0.7rem; letter-spacing: 0.1em;
      color: var(--sage); text-align: center;
      text-transform: uppercase;
    }

    /* Message input */
    .msg-label {
      font-size: 0.7rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--sage);
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%; padding: 0.9rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-style: italic;
      font-weight: 300; color: var(--deep);
      background: var(--cream); border: 1.5px solid var(--mist);
      border-radius: 12px; resize: none; outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--rose); }
    textarea::placeholder { color: var(--mist); }

    .to-input {
      width: 100%; padding: 0.75rem 0.9rem;
      font-family: 'Jost', sans-serif; font-size: 0.85rem;
      font-weight: 300; color: var(--deep);
      background: var(--cream); border: 1.5px solid var(--mist);
      border-radius: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .to-input:focus { border-color: var(--rose); }
    .to-input::placeholder { color: var(--mist); }

    /* Send button */
    .send-btn {
      width: 100%; padding: 1rem;
      font-family: 'Jost', sans-serif; font-size: 0.75rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      background: var(--deep); color: var(--cream);
      border: none; border-radius: 100px;
      cursor: pointer; transition: all 0.25s;
      margin-top: auto;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--rose);
      box-shadow: 0 8px 24px rgba(201,122,111,0.3);
      transform: translateY(-2px);
    }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    .clear-btn {
      width: 100%; padding: 0.6rem;
      font-family: 'Jost', sans-serif; font-size: 0.7rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      background: none; color: var(--sage);
      border: none; cursor: pointer; transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--rose); }

    /* SHARE MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44,31,26,0.5); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 24px;
      padding: 2.5rem; max-width: 420px; width: 90%;
      text-align: center;
      animation: rise 0.4s cubic-bezier(.22,1,.36,1);
    }
    @keyframes rise {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .modal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300; margin-bottom: 0.5rem;
    }
    .modal p { font-size: 0.85rem; color: var(--sage); margin-bottom: 1.5rem; }
    .share-link {
      display: flex; gap: 0.5rem;
      background: var(--cream); border-radius: 12px;
      padding: 0.5rem 0.75rem; margin-bottom: 1.5rem;
      align-items: center;
    }
    .share-link input {
      flex: 1; border: none; background: none;
      font-size: 0.75rem; color: var(--deep);
      font-family: monospace; outline: none;
      overflow: hidden; text-overflow: ellipsis;
    }
    .copy-btn {
      padding: 0.4rem 0.9rem; background: var(--deep);
      color: white; border: none; border-radius: 8px;
      font-size: 0.7rem; letter-spacing: 0.1em;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .copy-btn:hover { background: var(--rose); }
    .modal-close {
      font-size: 0.75rem; color: var(--sage); background: none;
      border: none; cursor: pointer; letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .modal-close:hover { color: var(--rose); }
    .modal-preview { font-size: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">🌸 bloomgram</a>
    <span style="font-size:0.75rem;color:var(--sage);letter-spacing:0.1em;text-transform:uppercase;">build a bouquet</span>
  </nav>

  <div class="layout">
    <!-- LEFT: Flower Picker -->
    <section class="picker-panel">
      <h2 class="panel-title">Choose your flowers</h2>
      <p class="panel-sub">tap to add · tap again to remove</p>

      <p class="section-label">Classics</p>
      <div class="flower-grid" id="grid-classics"></div>

      <p class="section-label">Tropicals</p>
      <div class="flower-grid" id="grid-tropicals"></div>

      <p class="section-label">Wilds & Extras</p>
      <div class="flower-grid" id="grid-wilds"></div>
    </section>

    <!-- RIGHT: Preview + Message -->
    <aside class="preview-panel">
      <h3 class="preview-title">Your bouquet</h3>

      <div>
        <div class="bouquet-canvas empty" id="bouquetCanvas"></div>
        <p class="bouquet-count" id="bouquetCount" style="margin-top:0.6rem;"></p>
      </div>

      <button class="clear-btn" onclick="clearBouquet()">✕ Clear all</button>

      <div>
        <p class="msg-label">To</p>
        <input class="to-input" type="text" id="toInput" placeholder="someone special..." maxlength="40"/>
      </div>
      <div>
        <p class="msg-label">Your message</p>
        <textarea id="msgInput" rows="4" placeholder="thinking of you..." maxlength="200"></textarea>
      </div>

      <button class="send-btn" id="sendBtn" onclick="openShare()">✦ Send Bouquet</button>
    </aside>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-preview" id="modalPreview"></div>
      <h2>Your bouquet is ready!</h2>
      <p id="modalDesc">Share this link with someone special 💛</p>
      <div class="share-link">
        <input type="text" id="shareUrl" readonly/>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
      </div>
      <button class="modal-close" onclick="closeShare()">← keep building</button>
    </div>
  </div>

  <script>
    const FLOWERS = {
      classics: [
        { emoji: '🌹', name: 'Rose' },
        { emoji: '🌷', name: 'Tulip' },
        { emoji: '🌸', name: 'Cherry Blossom' },
        { emoji: '💐', name: 'Bouquet' },
        { emoji: '🌼', name: 'Daisy' },
        { emoji: '🌻', name: 'Sunflower' },
      ],
      tropicals: [
        { emoji: '🌺', name: 'Hibiscus' },
        { emoji: '🪷', name: 'Lotus' },
        { emoji: '🌴', name: 'Palm' },
        { emoji: '🍀', name: 'Clover' },
        { emoji: '🌵', name: 'Cactus' },
        { emoji: '🪸', name: 'Coral' },
      ],
      wilds: [
        { emoji: '🍃', name: 'Leaves' },
        { emoji: '🌿', name: 'Herb' },
        { emoji: '🍂', name: 'Autumn Leaf' },
        { emoji: '🍁', name: 'Maple' },
        { emoji: '🌾', name: 'Wheat' },
        { emoji: '🎋', name: 'Bamboo' },
      ]
    };

    let bouquet = [];

    function renderGrid(id, flowers) {
      const grid = document.getElementById(id);
      flowers.forEach(f => {
        const card = document.createElement('div');
        card.className = 'flower-card';
        card.id = 'card-' + f.emoji;
        card.innerHTML = `
          <span class="emoji">${f.emoji}</span>
          <span class="name">${f.name}</span>
          <span class="count-badge" id="badge-${f.emoji}">1</span>
        `;
        card.onclick = () => toggleFlower(f.emoji, card);
        grid.appendChild(card);
      });
    }

    renderGrid('grid-classics', FLOWERS.classics);
    renderGrid('grid-tropicals', FLOWERS.tropicals);
    renderGrid('grid-wilds', FLOWERS.wilds);

    function toggleFlower(emoji, card) {
      bouquet.push(emoji);
      card.classList.add('selected');
      // update badge
      const count = bouquet.filter(e => e === emoji).length;
      document.getElementById('badge-' + emoji).textContent = count;
      renderBouquet();
    }

    function renderBouquet() {
      const canvas = document.getElementById('bouquetCanvas');
      const countEl = document.getElementById('bouquetCount');
      canvas.innerHTML = '';
      canvas.classList.toggle('empty', bouquet.length === 0);

      bouquet.forEach((emoji, i) => {
        const span = document.createElement('span');
        span.className = 'bouquet-flower';
        span.textContent = emoji;
        span.title = 'click to remove';
        span.onclick = () => removeOne(i);
        canvas.appendChild(span);
      });

      countEl.textContent = bouquet.length > 0
        ? `${bouquet.length} flower${bouquet.length !== 1 ? 's' : ''} in your bouquet`
        : '';

      document.getElementById('sendBtn').disabled = bouquet.length === 0;
    }

    function removeOne(index) {
      const emoji = bouquet[index];
      bouquet.splice(index, 1);
      const count = bouquet.filter(e => e === emoji).length;
      const badge = document.getElementById('badge-' + emoji);
      if (count === 0) {
        document.getElementById('card-' + emoji).classList.remove('selected');
        badge.textContent = '1';
      } else {
        badge.textContent = count;
      }
      renderBouquet();
    }

    function clearBouquet() {
      bouquet = [];
      document.querySelectorAll('.flower-card').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.count-badge').forEach(b => b.textContent = '1');
      renderBouquet();
    }

    function openShare() {
      if (bouquet.length === 0) return;
      const to = encodeURIComponent(document.getElementById('toInput').value || '');
      const msg = encodeURIComponent(document.getElementById('msgInput').value || '');
      const flowers = encodeURIComponent(bouquet.join(','));
      const url = `${location.origin}/view.html?flowers=${flowers}&to=${to}&msg=${msg}`;
      document.getElementById('shareUrl').value = url;
      document.getElementById('modalPreview').textContent = bouquet.slice(0, 7).join('');
      document.getElementById('modalDesc').textContent =
        to ? `Send this bouquet to ${decodeURIComponent(to)} 💛` : 'Share this link with someone special 💛';
      document.getElementById('modal').classList.add('open');
    }

    function closeShare() {
      document.getElementById('modal').classList.remove('open');
    }

    function copyLink() {
      const input = document.getElementById('shareUrl');
      input.select();
      navigator.clipboard.writeText(input.value).catch(() => {});
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    renderBouquet();
  </script>
</body>
</html>
