<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>build your bouquet — bloomgram</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#faf6f0;--blush:#f0d9cc;--rose:#c97a6f;
      --deep:#2c1f1a;--sage:#8a9e84;--mist:#e8e0d8;
    }
    html,body{min-height:100%;background:var(--cream);color:var(--deep);font-family:'Jost',sans-serif;font-weight:300}

    nav{position:sticky;top:0;z-index:99;background:rgba(250,246,240,0.92);backdrop-filter:blur(16px);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--mist)}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;letter-spacing:.15em;text-decoration:none;color:var(--deep)}
    .nav-brand:hover{color:var(--rose)}
    .nav-steps{display:flex;gap:.5rem;align-items:center}
    .sdot{width:6px;height:6px;border-radius:50%;background:var(--mist);transition:background .3s}
    .sdot.active{background:var(--rose)}

    .layout{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 57px)}
    @media(max-width:860px){.layout{grid-template-columns:1fr}}

    /* ═══ LEFT PICKER ═══ */
    .picker{padding:2rem;border-right:1px solid var(--mist);overflow-y:auto}
    .picker-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:.25rem}
    .picker-title em{font-style:italic;color:var(--rose)}
    .picker-sub{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin-bottom:1.75rem}

    .cat-tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .cat-tab{padding:.38rem .9rem;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;border:1.5px solid var(--mist);border-radius:100px;cursor:pointer;transition:all .2s;background:transparent;color:var(--sage);font-family:'Jost',sans-serif}
    .cat-tab.on,.cat-tab:hover{border-color:var(--rose);color:var(--rose);background:rgba(201,122,111,.06)}

    .flower-section{display:none}.flower-section.visible{display:block}
    .flower-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.75rem}

    .flower-card{background:white;border:1.5px solid var(--mist);border-radius:16px;padding:.75rem .5rem .65rem;text-align:center;cursor:pointer;transition:all .22s;user-select:none;position:relative}
    .flower-card:hover{border-color:var(--rose);transform:translateY(-3px);box-shadow:0 6px 18px rgba(201,122,111,.14)}
    .flower-card.sel{border-color:var(--rose);background:#fff8f7}
    .flower-card img{width:72px;height:72px;object-fit:contain;display:block;margin:0 auto .4rem;transition:transform .2s}
    .flower-card:hover img{transform:scale(1.12) rotate(4deg)}
    .flower-card .fname{font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:var(--sage)}
    .flower-card .fbadge{position:absolute;top:6px;right:6px;background:var(--rose);color:white;font-size:.6rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;transform:scale(0)}
    .flower-card.sel .fbadge{opacity:1;transform:scale(1)}

    /* Image error fallback — show emoji */
    .flower-card img.broken{display:none}
    .flower-card .fallback-emoji{font-size:2.5rem;display:none;margin-bottom:.35rem}
    .flower-card img.broken ~ .fallback-emoji{display:block}

    .greens-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
    .green-chip{padding:.45rem .85rem;background:white;border:1.5px solid var(--mist);border-radius:100px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem}
    .green-chip img{width:28px;height:28px;object-fit:contain}
    .green-chip .gname{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--sage)}
    .green-chip:hover,.green-chip.sel{border-color:var(--sage);background:#f0f5ee}

    /* ═══ RIGHT PREVIEW ═══ */
    .preview{background:white;padding:2rem 1.75rem;display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
    @media(max-width:860px){.preview{position:relative;height:auto;border-top:1px solid var(--mist)}}
    .preview-label{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--sage)}

    /* ═══ BOUQUET VISUAL (pure HTML/CSS) ═══ */
    .bouquet-stage{
      position:relative;
      width:100%;
      height:320px;
      background:var(--cream);
      border-radius:18px;
      overflow:hidden;
      flex-shrink:0;
    }

    /* Wrapping paper cone — pure CSS */
    .wrap-cone{
      position:absolute;
      bottom:0;left:50%;
      transform:translateX(-50%);
      width:0;
      border-left:90px solid transparent;
      border-right:90px solid transparent;
      border-bottom:160px solid #f5e6d3;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }
    .wrap-cone::before{
      content:'';position:absolute;
      left:-78px;top:20px;
      width:0;
      border-left:78px solid transparent;
      border-right:0px solid transparent;
      border-bottom:140px solid rgba(180,145,105,0.25);
    }
    .wrap-cone::after{
      /* fold line highlight */
      content:'';position:absolute;
      left:-20px;top:0;
      width:2px;height:140px;
      background:rgba(210,185,155,0.4);
      transform:rotate(3deg);
    }

    /* Ribbon on cone */
    .ribbon-band{
      position:absolute;
      bottom:130px;left:50%;
      transform:translateX(-50%);
      width:140px;height:14px;
      border-radius:7px;
      transition:background .3s;
      z-index:3;
    }
    /* Bow */
    .ribbon-bow{
      position:absolute;
      bottom:144px;left:50%;
      transform:translateX(-50%);
      width:60px;height:28px;
      z-index:3;
    }
    .bow-left,.bow-right{
      position:absolute;
      width:26px;height:20px;
      border-radius:50% 0 0 50%;
      top:4px;
      transition:background .3s;
    }
    .bow-left{left:4px;transform:rotate(-25deg);}
    .bow-right{right:4px;border-radius:0 50% 50% 0;transform:rotate(25deg);}
    .bow-knot{
      position:absolute;
      width:10px;height:10px;
      border-radius:50%;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      z-index:1;
      transition:background .3s;
    }

    /* Flowers container */
    .flowers-container{
      position:absolute;
      bottom:140px;
      left:0;right:0;
      height:220px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    /* Individual flower in bouquet */
    .b-flower{
      position:absolute;
      transition:all .3s cubic-bezier(.22,1,.36,1);
      animation:flowerPop .4s cubic-bezier(.22,1,.36,1);
      transform-origin:50% 100%;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    .b-flower img{
      display:block;
      pointer-events:none;
    }
    @keyframes flowerPop{
      0%{transform:scale(0) rotate(-20deg);opacity:0}
      60%{transform:scale(1.1);opacity:1}
      100%{transform:scale(1);opacity:1}
    }

    /* Empty state */
    .bouquet-empty{
      position:absolute;
      top:30%;left:50%;
      transform:translateX(-50%);
      text-align:center;
      color:var(--mist);
      font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;
      pointer-events:none;
    }

    .flower-count{font-size:.68rem;letter-spacing:.1em;color:var(--sage);text-align:center;text-transform:uppercase;min-height:1rem}

    /* Ribbon swatches */
    .ribbon-row{display:flex;gap:.5rem;align-items:center}
    .rswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
    .rswatch.active{border-color:var(--deep);transform:scale(1.2)}

    .field-group{display:flex;flex-direction:column;gap:.4rem}
    .field-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sage)}
    .field-input{width:100%;padding:.7rem .9rem;font-family:'Jost',sans-serif;font-size:.88rem;font-weight:300;color:var(--deep);background:var(--cream);border:1.5px solid var(--mist);border-radius:12px;outline:none;transition:border-color .2s}
    .field-input:focus{border-color:var(--rose)}
    .field-input::placeholder{color:#d8d0c8}
    textarea.field-input{resize:none;font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;line-height:1.6}

    .send-btn{width:100%;padding:1rem;font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.24em;text-transform:uppercase;background:var(--deep);color:var(--cream);border:none;border-radius:100px;cursor:pointer;transition:all .25s;margin-top:auto;flex-shrink:0}
    .send-btn:hover:not(:disabled){background:var(--rose);box-shadow:0 8px 28px rgba(201,122,111,.32);transform:translateY(-2px)}
    .send-btn:disabled{opacity:.35;cursor:default}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,31,26,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .modal-overlay.open{display:flex}
    .modal{background:white;border-radius:28px;padding:2.5rem 2rem;max-width:400px;width:92%;text-align:center;animation:modalIn .4s cubic-bezier(.22,1,.36,1)}
    @keyframes modalIn{from{transform:translateY(32px) scale(.94);opacity:0}to{transform:none;opacity:1}}
    .modal-prev-imgs{display:flex;justify-content:center;gap:-8px;margin-bottom:.75rem;height:64px;position:relative}
    .modal-prev-imgs img{width:52px;height:52px;object-fit:contain;position:absolute;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
    .modal h2{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;margin-bottom:.4rem}
    .modal-sub{font-size:.82rem;color:var(--sage);margin-bottom:1.5rem}
    .share-row{display:flex;gap:.4rem;background:var(--cream);border-radius:12px;padding:.5rem .7rem;margin-bottom:1.25rem;align-items:center}
    .share-row input{flex:1;border:none;background:none;font-size:.72rem;color:var(--deep);font-family:monospace;outline:none;overflow:hidden;text-overflow:ellipsis}
    .copy-btn{padding:.38rem .85rem;background:var(--deep);color:white;border:none;border-radius:8px;font-size:.68rem;cursor:pointer;transition:background .2s;white-space:nowrap}
    .copy-btn:hover{background:var(--rose)}
    .modal-close{font-size:.72rem;color:var(--sage);background:none;border:none;cursor:pointer;letter-spacing:.1em;text-transform:uppercase}
    .modal-close:hover{color:var(--rose)}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--mist)}
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">🌸 bloomgram</a>
  <div class="nav-steps">
    <div class="sdot active" id="d1"></div>
    <div style="width:14px;height:1px;background:var(--mist)"></div>
    <div class="sdot" id="d2"></div>
    <div style="width:14px;height:1px;background:var(--mist)"></div>
    <div class="sdot" id="d3"></div>
  </div>
</nav>

<div class="layout">
  <!-- LEFT -->
  <section class="picker">
    <h2 class="picker-title">Pick your <em>flowers</em></h2>
    <p class="picker-sub">tap to add · tap again for more</p>

    <div class="cat-tabs">
      <button class="cat-tab on" onclick="showCat('classic',this)">Classics</button>
      <button class="cat-tab" onclick="showCat('romance',this)">Romance</button>
      <button class="cat-tab" onclick="showCat('wild',this)">Wild & Bright</button>
    </div>

    <div class="flower-section visible" id="sec-classic">
      <div class="flower-grid" id="grid-classic"></div>
    </div>
    <div class="flower-section" id="sec-romance">
      <div class="flower-grid" id="grid-romance"></div>
    </div>
    <div class="flower-section" id="sec-wild">
      <div class="flower-grid" id="grid-wild"></div>
    </div>

    <p class="picker-sub" style="margin-top:1.75rem;margin-bottom:.65rem">Add some greens</p>
    <div class="greens-row" id="greensRow"></div>
  </section>

  <!-- RIGHT -->
  <aside class="preview">
    <p class="preview-label">Your bouquet</p>

    <!-- BOUQUET VISUAL -->
    <div class="bouquet-stage" id="bouquetStage">
      <div class="bouquet-empty" id="bouquetEmpty">tap flowers to build your bouquet</div>
      <div class="flowers-container" id="flowersContainer"></div>
      <!-- CSS cone -->
      <div class="wrap-cone" id="cone"></div>
      <!-- Ribbon -->
      <div class="ribbon-band" id="ribbonBand" style="background:#c97a6f"></div>
      <div class="ribbon-bow" id="ribbonBow">
        <div class="bow-left" id="bowL" style="background:#c97a6f"></div>
        <div class="bow-right" id="bowR" style="background:#c97a6f"></div>
        <div class="bow-knot" id="bowK" style="background:#c97a6f"></div>
      </div>
    </div>

    <p class="flower-count" id="flowerCount"></p>

    <div>
      <p class="field-label" style="margin-bottom:.5rem">Ribbon colour</p>
      <div class="ribbon-row" id="ribbonRow"></div>
    </div>

    <div class="field-group">
      <label class="field-label">To</label>
      <input class="field-input" id="toInput" type="text" placeholder="someone special…" maxlength="40" oninput="updateDots()"/>
    </div>
    <div class="field-group">
      <label class="field-label">Your message</label>
      <textarea class="field-input" id="msgInput" rows="3" placeholder="thinking of you…" maxlength="200" oninput="updateDots()"></textarea>
    </div>

    <button class="send-btn" id="sendBtn" onclick="openShare()" disabled>✦ Send Bouquet</button>
  </aside>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-prev-imgs" id="modalImgs"></div>
    <h2 style="margin-top:1rem">Ready to send!</h2>
    <p class="modal-sub" id="modalSub">Share this link 💛</p>
    <div class="share-row">
      <input type="text" id="shareUrl" readonly/>
      <button class="copy-btn" onclick="copyLink()">Copy link</button>
    </div>
    <button class="modal-close" onclick="closeShare()">← keep building</button>
  </div>
</div>

<script>
const CDN  = 'https://pub-4ac1b7f0da8c43e8983d7821a18a8c0d.r2.dev/color/flowers/';
const GCDN = 'https://pub-4ac1b7f0da8c43e8983d7821a18a8c0d.r2.dev/color/greenery/';

const FLOWERS = {
  classic:[
    {id:'rose',       name:'Rose',        src:CDN+'rose.webp',       emoji:'🌹'},
    {id:'peony',      name:'Peony',       src:CDN+'peony.webp',      emoji:'🌸'},
    {id:'tulip',      name:'Tulip',       src:CDN+'tulip.webp',      emoji:'🌷'},
    {id:'sunflower',  name:'Sunflower',   src:CDN+'sunflower.webp',  emoji:'🌻'},
    {id:'daisy',      name:'Daisy',       src:CDN+'daisy.webp',      emoji:'🌼'},
    {id:'lily',       name:'Lily',        src:CDN+'lily.webp',       emoji:'🪷'},
  ],
  romance:[
    {id:'orchid',     name:'Orchid',      src:CDN+'orchid.webp',     emoji:'🌺'},
    {id:'dahlia',     name:'Dahlia',      src:CDN+'dahlia.webp',     emoji:'💐'},
    {id:'anemone',    name:'Anemone',     src:CDN+'anemone.webp',    emoji:'🌸'},
    {id:'ranunculus', name:'Ranunculus',  src:CDN+'ranunculus.webp', emoji:'🌹'},
    {id:'carnation',  name:'Carnation',   src:CDN+'carnation.webp',  emoji:'🌷'},
    {id:'zinnia',     name:'Zinnia',      src:CDN+'zinnia.webp',     emoji:'🌺'},
  ],
  wild:[
    {id:'sunflower',  name:'Sunflower',   src:CDN+'sunflower.webp',  emoji:'🌻'},
    {id:'daisy',      name:'Daisy',       src:CDN+'daisy.webp',      emoji:'🌼'},
    {id:'zinnia',     name:'Zinnia',      src:CDN+'zinnia.webp',     emoji:'🌺'},
    {id:'rose',       name:'Rose',        src:CDN+'rose.webp',       emoji:'🌹'},
    {id:'carnation',  name:'Carnation',   src:CDN+'carnation.webp',  emoji:'🌷'},
    {id:'anemone',    name:'Anemone',     src:CDN+'anemone.webp',    emoji:'🌸'},
  ]
};

const GREENS = [
  {id:'palm',   name:'Palm',  src:GCDN+'palm.webp',  emoji:'🌴'},
  {id:'fern',   name:'Fern',  src:GCDN+'fern.webp',  emoji:'🌿'},
  {id:'leaf',   name:'Leaf',  src:GCDN+'leaf.webp',  emoji:'🍃'},
];

const RIBBONS = ['#c97a6f','#b5967e','#8a9e84','#2c1f1a','#c4a882','#a0869e'];

let picked = []; // {id,src,emoji,name}
let greens = [];
let ribbonColor = RIBBONS[0];

/* ═══ Build picker grids ═══ */
function buildGrids(){
  Object.entries(FLOWERS).forEach(([cat,flowers])=>{
    const grid = document.getElementById('grid-'+cat);
    flowers.forEach(f=>{
      const card = document.createElement('div');
      card.className = 'flower-card';
      card.id = 'fc-'+cat+'-'+f.id;
      card.innerHTML = `
        <img src="${f.src}" alt="${f.name}" onerror="this.classList.add('broken')">
        <span class="fallback-emoji">${f.emoji}</span>
        <span class="fname">${f.name}</span>
        <span class="fbadge" id="fb-${cat}-${f.id}">1</span>`;
      card.onclick = ()=> addFlower(f, cat, card);
      grid.appendChild(card);
    });
  });

  // Greens
  GREENS.forEach(g=>{
    const chip = document.createElement('div');
    chip.className = 'green-chip';
    chip.id = 'gc-'+g.id;
    chip.innerHTML = `
      <img src="${g.src}" alt="${g.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span style="display:none;font-size:1.2rem">${g.emoji}</span>
      <span class="gname">${g.name}</span>`;
    chip.onclick = ()=> addGreen(g, chip);
    document.getElementById('greensRow').appendChild(chip);
  });

  // Ribbons
  RIBBONS.forEach((c,i)=>{
    const s = document.createElement('div');
    s.className = 'rswatch' + (i===0?' active':'');
    s.style.background = c;
    s.onclick = ()=>{
      ribbonColor = c;
      document.querySelectorAll('.rswatch').forEach((x,j)=>x.classList.toggle('active',j===i));
      setRibbon(c);
    };
    document.getElementById('ribbonRow').appendChild(s);
  });
}

function setRibbon(c){
  document.getElementById('ribbonBand').style.background = c;
  document.getElementById('bowL').style.background = c;
  document.getElementById('bowR').style.background = c;
  document.getElementById('bowK').style.background = c;
}

function showCat(cat, btn){
  document.querySelectorAll('.flower-section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+cat).classList.add('visible');
  btn.classList.add('on');
}

/* ═══ Add flowers ═══ */
function addFlower(f, cat, card){
  picked.push({...f});
  card.classList.add('sel');
  const cnt = picked.filter(x=>x.id===f.id).length;
  document.getElementById('fb-'+cat+'-'+f.id).textContent = cnt;
  renderBouquet();
}

function addGreen(g, chip){
  greens.push({...g});
  chip.classList.add('sel');
  renderBouquet();
}

/* ═══ RENDER BOUQUET — pure HTML positioning ═══ */
function renderBouquet(){
  const container = document.getElementById('flowersContainer');
  container.innerHTML = '';

  const all = [...greens, ...picked]; // greens behind
  const n = all.length;

  document.getElementById('bouquetEmpty').style.display = n===0?'block':'none';
  document.getElementById('flowerCount').textContent = n>0?`${n} stem${n!==1?'s':''} in your bouquet`:'';
  document.getElementById('sendBtn').disabled = picked.length===0;
  updateDots();

  if(n===0) return;

  // Stage dimensions
  const stageW = document.getElementById('bouquetStage').clientWidth || 340;
  const stageH = 320;
  const cx = stageW / 2;
  const baseY = 155; // vertical center of arrangement

  // Get positions for all flowers
  const positions = arrangeFlowers(n, cx, baseY, stageW);

  all.forEach((item, i)=>{
    const pos = positions[i];
    const el = document.createElement('div');
    el.className = 'b-flower';
    el.style.cssText = `
      left:${pos.x}px;
      bottom:${stageH - pos.y - pos.size/2}px;
      width:${pos.size}px;
      height:${pos.size}px;
      transform:rotate(${pos.rot}deg);
      animation-delay:${i*0.04}s;
      z-index:${10 + i};
    `;

    // Try CDN image, fallback to emoji
    const img = document.createElement('img');
    img.src = item.src;
    img.alt = item.name;
    img.style.cssText = `width:${pos.size}px;height:${pos.size}px;object-fit:contain;`;
    img.onerror = function(){
      this.style.display='none';
      const em = document.createElement('span');
      em.style.cssText = `font-size:${pos.size*0.75}px;line-height:1;display:block;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))`;
      em.textContent = item.emoji;
      el.appendChild(em);
    };
    el.appendChild(img);
    container.appendChild(el);
  });
}

function arrangeFlowers(n, cx, baseY, stageW){
  const positions = [];
  // Split into up to 3 layers
  const nLayers = n<=2?1:n<=5?2:3;

  // Split items into layers
  const layerSizes = [];
  if(nLayers===1){ layerSizes.push(n); }
  else if(nLayers===2){ const s=Math.ceil(n/2); layerSizes.push(s,n-s); }
  else { const s0=Math.ceil(n/3),s1=Math.ceil((n-s0)/2); layerSizes.push(s0,s1,n-s0-s1||1); }

  let itemIdx=0;
  layerSizes.forEach((layerSize,layer)=>{
    for(let j=0;j<layerSize;j++){
      const maxSpread = Math.min(80 + n*5, 120);
      const spread = maxSpread * (0.5 + layer*0.25);
      const angle = layerSize>1?(-spread/2+(spread/(layerSize-1))*j):0;
      const rad = angle*Math.PI/180;

      // Layer gets progressively lower and closer to center
      const dist = 15 + layer*20;
      const yBase = baseY - layer*28 - n*2;

      const x = cx + Math.sin(rad)*dist - (positions[0]?.size||80)/2 + (Math.random()-.5)*4;
      const y = yBase - Math.cos(rad)*10 + layer*8 + (Math.random()-.5)*4;

      const baseSize = Math.max(60, Math.min(90, stageW*0.22 - n*1.2));
      const size = baseSize + layer*5;
      const rot = angle*0.45 + (Math.random()-.5)*10;

      positions.push({x, y, size, rot});
      itemIdx++;
    }
  });

  return positions;
}

/* ═══ Dots + Share ═══ */
function updateDots(){
  const h1 = picked.length>0;
  const h2 = h1&&(document.getElementById('toInput').value.trim()||document.getElementById('msgInput').value.trim());
  document.getElementById('d1').classList.toggle('active',h1);
  document.getElementById('d2').classList.toggle('active',!!h2);
}

/* Short code map — keeps share URLs short and clean */
const SHORT = {rose:'r',peony:'p',tulip:'t',sunflower:'s',daisy:'d',lily:'l',orchid:'o',dahlia:'h',anemone:'a',ranunculus:'n',carnation:'c',zinnia:'z',palm:'1',fern:'2',leaf:'3'};

function openShare(){
  if(!picked.length) return;
  const to  = document.getElementById('toInput').value.trim();
  const msg = document.getElementById('msgInput').value.trim();
  // Use short codes joined with + (no URL encoding needed)
  const codes = [...picked,...greens].map(x=>SHORT[x.id]||x.id).join('+');
  const url = `${location.origin}/view.html?f=${codes}${to?'&to='+encodeURIComponent(to):''}${msg?'&m='+encodeURIComponent(msg):''}`;
  document.getElementById('shareUrl').value = url;

  // Modal preview — show flower images
  const mi = document.getElementById('modalImgs');
  mi.innerHTML = '';
  picked.slice(0,5).forEach((f,i)=>{
    const img = document.createElement('img');
    img.src = f.src; img.alt = f.name;
    img.style.cssText = `left:${i*18}px;z-index:${i}`;
    img.onerror = function(){this.style.display='none'};
    mi.appendChild(img);
  });

  document.getElementById('modalSub').textContent = to?`Send this bouquet to ${to} 💛`:'Share this link 💛';
  document.getElementById('d3').classList.add('active');
  document.getElementById('modal').classList.add('open');
}

function closeShare(){ document.getElementById('modal').classList.remove('open') }

function copyLink(){
  const inp = document.getElementById('shareUrl');
  navigator.clipboard.writeText(inp.value).catch(()=>{inp.select();document.execCommand('copy')});
  const b = document.querySelector('.copy-btn');
  b.textContent='Copied! ✓';setTimeout(()=>b.textContent='Copy link',2000);
}

// Re-render on window resize
window.addEventListener('resize', ()=>{ if(picked.length||greens.length) renderBouquet() });

buildGrids();
</script>
