<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>you received a bouquet 🌸 — bloomgram</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf6f0;
      --blush: #f0d9cc;
      --rose: #c97a6f;
      --deep: #2c1f1a;
      --sage: #8a9e84;
      --mist: #e8e0d8;
    }
    html, body {
      min-height: 100vh;
      background: var(--cream);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    /* Petals */
    .petals-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute; opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Main */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .tag {
      font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--sage); margin-bottom: 1.5rem;
      opacity: 0; animation: rise 0.8s ease forwards 0.2s;
    }

    .to-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 6vw, 3.5rem); font-weight: 300;
      margin-bottom: 0.5rem;
      opacity: 0; animation: rise 0.8s ease forwards 0.4s;
    }
    .to-name em { font-style: italic; color: var(--rose); }

    .received-label {
      font-size: 0.8rem; letter-spacing: 0.1em; color: var(--sage);
      margin-bottom: 3rem;
      opacity: 0; animation: rise 0.8s ease forwards 0.6s;
    }

    /* Flower display */
    .flower-display {
      max-width: 520px; width: 100%;
      background: white; border-radius: 32px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(44,31,26,0.08);
      margin-bottom: 2rem;
      opacity: 0; animation: bloom 1s cubic-bezier(.22,1,.36,1) forwards 0.8s;
    }
    @keyframes bloom {
      0% { transform: scale(0.8) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .flowers-wrap {
      display: flex; flex-wrap: wrap;
      gap: 0.3rem; justify-content: center;
      margin-bottom: 1.5rem;
      min-height: 60px; align-items: center;
    }
    .flower-item {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      display: inline-block;
      animation: popIn 0.4s cubic-bezier(.22,1,.36,1) both;
      line-height: 1;
    }
    @keyframes popIn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .divider {
      width: 40px; height: 1px; background: var(--mist);
      margin: 0 auto 1.5rem;
    }

    .message-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 300;
      font-style: italic; line-height: 1.6; color: var(--deep);
    }
    .message-text:empty { display: none; }

    .empty-msg {
      font-size: 0.8rem; color: var(--mist);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* Actions */
    .actions {
      display: flex; flex-direction: column; gap: 0.8rem; align-items: center;
      opacity: 0; animation: rise 0.8s ease forwards 1.4s;
    }
    .btn {
      display: inline-block; padding: 0.85rem 2.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.75rem;
      font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase;
      text-decoration: none; border-radius: 100px; transition: all 0.25s ease;
    }
    .btn-primary { background: var(--deep); color: var(--cream); border: 1.5px solid var(--deep); }
    .btn-primary:hover { background: var(--rose); border-color: var(--rose); transform: translateY(-2px); }
    .btn-ghost { background: transparent; color: var(--deep); border: 1.5px solid var(--deep); }
    .btn-ghost:hover { background: var(--blush); transform: translateY(-2px); }

    @keyframes rise {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Footer */
    footer {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center; font-size: 0.7rem; letter-spacing: 0.12em;
      color: var(--sage); z-index: 2;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: var(--rose); }
  </style>
</head>
<body>
  <div class="petals-bg" id="petals"></div>

  <main class="page">
    <p class="tag">🌸 bloomgram — a digital bouquet for you</p>

    <h1 class="to-name" id="toName">
      <em>for you</em>
    </h1>
    <p class="received-label">you received a bouquet</p>

    <div class="flower-display">
      <div class="flowers-wrap" id="flowerWrap">
        <span class="empty-msg">no flowers found</span>
      </div>
      <div class="divider"></div>
      <p class="message-text" id="messageText"></p>
    </div>

    <div class="actions">
      <a href="bouquet.html" class="btn btn-primary">✦ Send one back</a>
      <a href="index.html" class="btn btn-ghost">← home</a>
    </div>
  </main>

  <footer>
    <a href="index.html">bloomgram</a> &nbsp;·&nbsp; <a href="https://vercel.com">powered by ▲ vercel</a>
  </footer>

  <script>
    // Parse URL params
    const params = new URLSearchParams(location.search);
    const flowersParam = params.get('flowers') || '';
    const toParam = params.get('to') || '';
    const msgParam = params.get('msg') || '';

    // Set "to" name
    const toEl = document.getElementById('toName');
    if (toParam.trim()) {
      toEl.innerHTML = `for <em>${toParam.trim()}</em>`;
      document.title = `💐 a bouquet for ${toParam.trim()} — bloomgram`;
    }

    // Render flowers
    const flowerWrap = document.getElementById('flowerWrap');
    const flowers = flowersParam ? flowersParam.split(',').filter(Boolean) : [];
    if (flowers.length > 0) {
      flowerWrap.innerHTML = '';
      flowers.forEach((emoji, i) => {
        const span = document.createElement('span');
        span.className = 'flower-item';
        span.textContent = emoji;
        span.style.animationDelay = (i * 0.06) + 's';
        flowerWrap.appendChild(span);
      });
    }

    // Set message
    const msgEl = document.getElementById('messageText');
    if (msgParam.trim()) {
      msgEl.textContent = `"${msgParam.trim()}"`;
    }

    // Confetti-style petals from the bouquet itself
    const petalEmoji = flowers.length > 0 ? flowers : ['🌸','🌺','🌼'];
    const container = document.getElementById('petals');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = petalEmoji[Math.floor(Math.random() * petalEmoji.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (Math.random() * 1.2 + 0.7) + 'rem';
      p.style.animationDuration = (Math.random() * 8 + 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
